<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Registro Integral Pro</title>
<style>
:root{
  --bg: #0a0a0c;
  --card: #1c222d;
  --primary: #1976d2;
  --text: #e0e0e0;
  --glass: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.1);
  --danger: #d32f2f;
  --success: #00c853;
}

/* ELIMINACIÓN TOTAL DE BARRAS DE DESPLAZAMIENTO */
* { 
    scrollbar-width: none !important; 
    -ms-overflow-style: none !important; 
    outline: none; 
}
*::-webkit-scrollbar { 
    display: none !important; 
    width: 0 !important; 
    height: 0 !important; 
}

body{
  margin:0; font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top right, #1a1a2e, #0a0a0c);
  color:var(--text); min-height: 100vh; overflow: hidden;
  padding-top: env(safe-area-inset-top);
  -webkit-tap-highlight-color: transparent;
}

/* SPLASH SCREEN */
#splash {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 10000; transition: opacity 0.5s ease;
}
.loader-logo { font-size: 60px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--primary)); animation: pulse 2s infinite; }
.loader-bar { width: 150px; height: 4px; background: var(--glass); border-radius: 10px; overflow: hidden; }
.loader-progress { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); animation: load 1.5s forwards; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
@keyframes load { to { width: 100%; } }

/* TOAST / NOTIFICACIONES */
#toast {
  position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-120px);
  background: rgba(28, 34, 45, 0.9); color: #fff; border: 1px solid var(--primary);
  padding: 14px 24px; border-radius: 20px; backdrop-filter: blur(15px);
  z-index: 10000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-weight: 500;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* AVISO DE CONFIRMACIÓN PERSONALIZADO */
#customConfirm {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center; z-index: 11000;
  backdrop-filter: blur(8px);
}
.confirm-card {
  background: var(--card); border: 1px solid var(--border);
  width: 85%; max-width: 320px; border-radius: 25px; padding: 25px; text-align: center;
}

header{
  padding: 15px 20px; background: var(--glass); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
}
header button#btnConfig{
  border: 1px solid var(--border); background: var(--primary); color: #fff;
  border-radius: 12px; width: 42px; height: 42px; cursor: pointer; font-size: 20px;
}

main{ 
    padding:20px; display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:15px; 
    height: calc(100vh - 80px); overflow-y: auto;
}
.card {
  background: rgba(30, 30, 35, 0.6); border: 1px solid var(--border);
  border-radius: 20px; padding: 20px; text-align: center; backdrop-filter: blur(10px);
}

.modal{
  position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter: blur(10px);
  display:none; align-items:center; justify-content:center; z-index: 2000;
}
.modalContent{
  background: var(--card); border: 1px solid var(--border); width: 92%; max-width: 420px;
  border-radius: 30px; position: relative; height: 85vh; display: flex; flex-direction: column; overflow: hidden;
}
.modal-header { padding: 20px 20px 10px; flex-shrink: 0; }
.tab-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
.tab-btn {
  background: rgba(255,255,255,0.05); color: #888; border: 1px solid var(--border); 
  padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 12px; white-space: nowrap;
}
.tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.tab-body { flex: 1; padding: 0 20px 20px; overflow: hidden; display: flex; flex-direction: column; }
.tab-content { display: none; height: 100%; flex-direction: column; overflow-y: auto; }
.tab-content.active { display: flex; }

input, select {
  width:100%; padding:12px 15px; border-radius:12px; border:1px solid var(--border);
  background: rgba(255, 255, 255, 0.07); color: #fff; margin-top: 8px; 
  box-sizing: border-box; font-size: 14px; appearance: none;
}
select option { background-color: #1c222d; color: white; }

.action-btn {
  width: 100%; margin-top: 12px; padding: 14px; border-radius: 14px;
  border: none; background: var(--primary); color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s;
}

.scroll-area { 
  flex: 1; margin-top: 15px; background: rgba(0,0,0,0.1); 
  border-radius: 15px; padding: 10px; overflow-y: auto; 
}

.list-item {
  display:flex; justify-content:space-between; align-items:center; 
  background: var(--glass); padding: 12px; border-radius: 14px; margin-bottom: 8px; font-size: 13px;
  border: 1px solid var(--border);
}
.section-title { font-size: 11px; color: var(--primary); font-weight: bold; text-transform: uppercase; margin-top: 15px; display: block; }
.close-btn { position: absolute; top: 18px; right: 20px; background: #2d3442; border: none; color: #fff; width: 30px; height: 30px; border-radius: 8px; z-index: 10; }

/* ESTILO SWITCH CAMARA */
.switch-container {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 12px;
  margin-top: 10px; border: 1px solid var(--border);
}
.switch { position: relative; display: inline-block; width: 44px; height: 24px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; cursor: pointer; inset: 0; background-color: #333;
  transition: .4s; border-radius: 34px;
}
.slider:before {
  position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
  background-color: white; transition: .4s; border-radius: 50%;
}
input:checked + .slider { background-color: var(--success); }
input:checked + .slider:before { transform: translateX(20px); }
</style>
</head>
<body>

<div id="splash">
  <div class="loader-logo">📑</div>
  <div style="font-weight: bold; letter-spacing: 2px; margin-bottom: 15px;">REGISTRO PRO</div>
  <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<div id="toast">✅ Acción exitosa</div>

<div id="customConfirm">
  <div class="confirm-card">
    <div id="confirmIcon" style="font-size: 40px; margin-bottom: 15px;">⚠️</div>
    <p id="confirmMsg" style="margin-bottom: 25px; line-height: 1.5; font-weight: 500;"></p>
    <div style="display: flex; gap: 10px;">
      <button class="action-btn" id="confirmCancel" style="background: #2d3442; margin: 0;">Cancelar</button>
      <button class="action-btn" id="confirmOk" style="background: var(--danger); margin: 0;">Eliminar</button>
    </div>
  </div>
</div>

<header>
  <span style="font-weight:bold; letter-spacing:1px">REGISTRO PRO</span>
  <button id="btnConfig" onclick="openConfig()">⚙️</button>
</header>

<main id="main"></main>

<div class="modal" id="configModal">
<div class="modalContent">
  <button class="close-btn" onclick="closeConfig()">✕</button>
  <div class="modal-header">
    <h3 style="margin: 0 0 15px 0; font-size: 18px;">Configuración</h3>
    <div class="tab-container">
      <button class="tab-btn active" onclick="switchTab('tab-win', this)">Ventanas</button>
      <button class="tab-btn" onclick="switchTab('tab-pre', this)">Biblioteca</button>
      <button class="tab-btn" onclick="switchTab('tab-fields', this)">Asignar</button>
      <button class="tab-btn" onclick="switchTab('tab-wsap', this)">WhatsApp</button>
    </div>
  </div>

  <div class="tab-body">
    <div id="tab-win" class="tab-content active">
        <span class="section-title">Nueva Ventana</span>
        <input id="vName" placeholder="Nombre de Ventana">
        <input id="vIcon" placeholder="Emoji">
        <button class="action-btn" onclick="addWindow()">Crear Ventana</button>
        <span class="section-title">Gestionar</span>
        <select id="delWinSelect"></select>
        <button class="action-btn" onclick="askDeleteWindow()" style="background:var(--danger)">Borrar Ventana</button>
    </div>

    <div id="tab-pre" class="tab-content">
        <span class="section-title">Biblioteca de Campos</span>
        <input id="pName" placeholder="Nombre del Campo">
        <input id="pIcon" placeholder="Emoji">
        <select id="pType">
          <option value="text">Texto</option>
          <option value="number">Número</option>
          <option value="auto">Fecha y Hora Automática ⚡</option>
        </select>
        <input id="pOpt" placeholder="Opciones (Ej: Si|No)">
        <div class="switch-container">
          <span style="font-size: 13px; color: #aaa;">Activar Cámara</span>
          <label class="switch"><input type="checkbox" id="pCam"><span class="slider"></span></label>
        </div>
        <button class="action-btn" onclick="addPreField()" style="background:var(--success); margin-top:15px">Guardar Campo</button>
      <span class="section-title">Campos Guardados</span>
      <div class="scroll-area" id="preList"></div>
    </div>

    <div id="tab-fields" class="tab-content">
        <span class="section-title">1. Seleccionar Ventana</span>
        <select id="fieldWin" onchange="refreshCurrentFieldsList()"></select>
        <span class="section-title">2. Seleccionar Campo</span>
        <select id="preSelect"></select>
        <button class="action-btn" onclick="linkPresetToWindow()">Vincular Campo ✅</button>
      <span class="section-title">Campos vinculados</span>
      <div class="scroll-area" id="currentFieldsList"></div>
    </div>

    <div id="tab-wsap" class="tab-content">
      <span class="section-title">Configuración WhatsApp</span>
      <input id="wsap" placeholder="+573000000000">
    </div>
  </div>
</div>
</div>

<div class="modal" id="formModal">
<div class="modalContent" style="height: auto; max-height: 85vh;">
  <button class="close-btn" onclick="closeForm()">✕</button>
  <div style="padding: 25px;">
    <h3 id="formTitle" style="color:var(--primary); margin: 0 0 20px 0;"></h3>
    <div id="formFields" style="max-height: 45vh; overflow-y: auto; padding-right:5px"></div>
    <div style="display:flex; gap:10px; margin-top:25px">
      <button class="action-btn" onclick="sendWhats()" style="flex:2">📤 Enviar</button>
      <button class="action-btn" onclick="clearForm()" style="flex:1; background:#2d3442">🧹</button>
    </div>
  </div>
</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("appDataV10")) || {windows:[], wsap:"", presets:[]};
let currentWin = null;
let currentPhotos = {};

const save=()=>localStorage.setItem("appDataV10",JSON.stringify(data));

function notify(msg) {
  const t = document.getElementById("toast"); t.innerText = msg;
  t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2000);
}

function customConfirm(msg, onOk) {
    const modal = document.getElementById("customConfirm");
    document.getElementById("confirmMsg").innerText = msg;
    modal.style.display = "flex";
    document.getElementById("confirmOk").onclick = () => { modal.style.display = "none"; onOk(); };
    document.getElementById("confirmCancel").onclick = () => { modal.style.display = "none"; };
}

function switchTab(tId, b) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active'));
  document.getElementById(tId).classList.add('active'); b.classList.add('active');
  if(tId === 'tab-fields') refreshCurrentFieldsList();
}

function refreshSelectors(){
  const options = data.windows.map((w,i)=>`<option value="${i}">${w.icon} ${w.name}</option>`).join("");
  fieldWin.innerHTML = options;
  delWinSelect.innerHTML = options;
  preSelect.innerHTML = `<option value="">-- Seleccionar --</option>` + data.presets.map((p,i)=>`<option value="${i}">${p.icon} ${p.name}</option>`).join("");
  preList.innerHTML = data.presets.map((p,i)=>`
    <div class="list-item"><span>${p.icon} ${p.name}</span><button onclick="deletePreset(${i})" style="background:none; border:none; color:var(--danger); font-weight:bold; cursor:pointer">✕</button></div>
  `).join("") || "<small style='color:#666'>Biblioteca vacía</small>";
}

function refreshCurrentFieldsList() {
    const winIdx = fieldWin.value;
    const container = document.getElementById("currentFieldsList");
    if(!data.windows[winIdx]) { container.innerHTML = ""; return; }
    container.innerHTML = data.windows[winIdx].fields.map((f, i) => `
      <div class="list-item">
        <span>${f.icon} ${f.name}</span>
        <button onclick="removeField(${winIdx}, ${i})" style="background:rgba(211,47,47,0.1); border:1px solid var(--danger); color:var(--danger); border-radius:6px; padding:2px 8px; font-size:10px; cursor:pointer">QUITAR</button>
      </div>
    `).join("") || "<small style='color:#666'>Sin campos vinculados</small>";
}

function addWindow(){
  if(!vName.value) return;
  data.windows.push({name:vName.value, icon:vIcon.value||'📁', fields:[]});
  vName.value=""; vIcon.value=""; save(); refreshSelectors(); render(); notify("Ventana creada");
}

function askDeleteWindow() {
    const idx = delWinSelect.value;
    if (idx === "" || !data.windows[idx]) return;
    customConfirm(`¿Eliminar ventana "${data.windows[idx].name}"?`, () => {
        data.windows.splice(idx, 1);
        save(); refreshSelectors(); render(); notify("Eliminado con éxito");
    });
}

function addPreField(){
  if(!pName.value) return;
  data.presets.push({ name: pName.value, icon: pIcon.value||"🔹", type: pType.value, opt: pOpt.value, cam: pCam.checked });
  pName.value=""; pIcon.value=""; pOpt.value=""; pCam.checked=false;
  save(); refreshSelectors(); notify("Campo guardado");
}

function deletePreset(i){ data.presets.splice(i,1); save(); refreshSelectors(); notify("Eliminado"); }

function linkPresetToWindow(){
  const winIdx = fieldWin.value; const preIdx = preSelect.value;
  if(winIdx === "" || preIdx === "") return;
  data.windows[winIdx].fields.push({...data.presets[preIdx]});
  save(); refreshCurrentFieldsList(); notify("Campo vinculado");
}

function removeField(wI, fI){ data.windows[wI].fields.splice(fI,1); save(); refreshCurrentFieldsList(); notify("Quitado"); }

function render(){
  main.innerHTML="";
  data.windows.forEach((w,i)=>{
    let d=document.createElement("div"); d.className="card";
    d.innerHTML=`<div style="font-size:35px">${w.icon}</div><div style="margin-top:10px; font-weight:600; font-size:14px">${w.name}</div>`;
    d.onclick=()=>openForm(i); main.appendChild(d);
  });
}

function openConfig(){ wsap.value=data.wsap||""; refreshSelectors(); configModal.style.display="flex"; }
function closeConfig(){ data.wsap=wsap.value; save(); render(); configModal.style.display="none"; }

function openForm(i){
  currentWin=i; currentPhotos={}; let w=data.windows[i]; formTitle.innerText=w.icon+" "+w.name; formFields.innerHTML="";
  w.fields.forEach((f,idx)=>{
    let d=document.createElement("div"); d.style.marginBottom="15px";
    d.innerHTML=`<label style="font-size:11px; color:#888; display:block; margin-bottom:5px">${f.icon} ${f.name}</label>`;
    if(f.type==="auto"){
        const now = new Date();
        const fStr = `${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()} - ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        d.innerHTML+=`<input data-i="${idx}" value="${fStr}" disabled>`;
    } 
    else if(f.opt) d.innerHTML+=`<select data-i="${idx}">${f.opt.split("|").map(o=>`<option>${o}</option>`).join("")}</select>`;
    else d.innerHTML+=`<input data-i="${idx}" type="${f.type==='number'?'number':'text'}" placeholder="...">`;
    
    if(f.cam){
      let fi=document.createElement("input"); fi.type="file"; fi.accept="image/*"; fi.capture="environment"; fi.style.display="none";
      let cb=document.createElement("button"); cb.className="action-btn"; cb.style.background="#2d3442"; cb.innerHTML="📸 Tomar Foto";
      cb.onclick=()=>fi.click();
      fi.onchange=(e)=>{
        let file = e.target.files[0];
        if(file){
            currentPhotos[idx] = file;
            let old=d.querySelector("img"); if(old) old.remove();
            let img=document.createElement("img"); img.src=URL.createObjectURL(file);
            img.style.width="100%"; img.style.borderRadius="12px"; img.style.marginTop="10px"; fi.after(img);
            notify("Foto capturada");
        }
      };
      d.appendChild(fi); d.appendChild(cb);
    }
    formFields.appendChild(d);
  });
  formModal.style.display="flex";
}

async function sendWhats(){
  let w=data.windows[currentWin]; 
  let msg=`*${w.icon} ${w.name.toUpperCase()}*\n─────────────────\n`;
  document.querySelectorAll("#formFields input,select").forEach(e=>{ 
    if(e.dataset.i!==undefined) {
        const fieldData = w.fields[e.dataset.i];
        msg+=`• *${fieldData.icon} ${fieldData.name}:* ${e.value}\n`; 
    }
  });

  if(Object.keys(currentPhotos).length > 0) msg += `\n📌 _(Adjunta la foto capturada)_`;

  try { await navigator.clipboard.writeText(msg); } catch(err) {}
  window.open(`https://wa.me/${data.wsap}?text=`+encodeURIComponent(msg));
}

function clearForm(){ 
    document.querySelectorAll("#formFields input").forEach(i=>!i.disabled&&(i.value="")); 
    document.querySelectorAll("#formFields img").forEach(i=>i.remove());
    currentPhotos = {};
}
function closeForm(){ formModal.style.display="none"; }

window.addEventListener('load', () => {
  setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').remove(), 500); }, 1500);
});
render();
</script>
</body>
</html>
